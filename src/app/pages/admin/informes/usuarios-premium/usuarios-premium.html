<div class="title">
  <app-go-back label="Volver al Menú" url="admin/informes" mode="dark"></app-go-back>
  <h1 class="page-title">Listado de usuarios premium</h1>
</div>

<div class="filters-container">
    <div class="inputs-row">
            <div class="amount-box">{{fechaHoy}}</div>
    </div>
</div>


<div class="table-container mat-elevation-z8">
  <table mat-table [dataSource]="usuarios">

    <ng-container matColumnDef="ID-USUARIO">
      <th mat-header-cell *matHeaderCellDef>ID</th>
      <td mat-cell *matCellDef="let element">
          {{ element.id }}
      </td>
    </ng-container>

    <ng-container matColumnDef="DNI">
      <th mat-header-cell *matHeaderCellDef>DNI</th>
      <td mat-cell *matCellDef="let element">
        {{ element.dni }}
      </td>
    </ng-container>

    <ng-container matColumnDef="NombreUsuario">
      <th mat-header-cell *matHeaderCellDef>Nombre Usuario</th>
      <td mat-cell *matCellDef="let element">
        {{ element.usuario.nombre }}
      </td>
    </ng-container>

    <ng-container matColumnDef="Email">
      <th mat-header-cell *matHeaderCellDef>Email</th>
      <td mat-cell *matCellDef="let element">
        {{ element.usuario.email }}
      </td>
    </ng-container>
    
    <ng-container matColumnDef="Telefono">
      <th mat-header-cell *matHeaderCellDef>Teléfono</th>
      <td mat-cell *matCellDef="let element">
        {{ element.usuario.telefono }}
      </td>
    </ng-container>

    <ng-container matColumnDef="Nivel">
      <th mat-header-cell *matHeaderCellDef>Nivel</th>
      <td mat-cell *matCellDef="let element">
        {{ element.usuario.nivel }}
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

</div>

<app-button3 text="Generar Reporte" (click)="generarReporte()"></app-button3>
@if (loading) {
  <app-spinner margin="20px auto 0 auto" size="md" mode="dark"></app-spinner>
}
