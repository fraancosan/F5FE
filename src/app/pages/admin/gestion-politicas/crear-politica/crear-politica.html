<div class="title">
  <app-go-back label="Volver al Menú" url="admin/politicas" mode="light"></app-go-back>
  <h1 class="page-title">{{isEditMode ? 'Editar Politica' : 'Crear Politica'}}</h1>
</div>

<form class="form" [formGroup]="form">
  <app-input-string
    label="Nombre de la politica"
    [icon]="faCalendar"
    type="text"
    name="nombre"
    placeholder="Ingrese el nombre de la politica"
    prefixMessage="El nombre de la politica"
    [required]="true"
    [form]="form"
    formControlName="nombre"
  ></app-input-string>

    <app-input-string
    label="Descripcion de la politica"
    [icon]="faCalendar"
    type="text"
    name="descripcion"
    placeholder="Ingrese la descripcion de la politica"
    prefixMessage="La descripcion de la politica"
    [required]="true"
    [form]="form"
    formControlName="descripcion"
  ></app-input-string>
  
  <div class="buttons">
    <app-button2 (click)="cancelar()" text="Cancelar"></app-button2>
    <app-button1 (click)="guardarPolitica()" text="{{isEditMode ? 'Actualizar politica' : 'Crear politica'}}"></app-button1>
  </div>

  @if (loading) {
  <app-spinner mode="light" [centrado]="true" size="md"></app-spinner>
  }
</form>
