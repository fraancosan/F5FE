<div class="title">
  <app-go-back label="Volver al Menú" url="inicio" mode="dark"></app-go-back>
  <h1 class="page-title">Politicas del complejo</h1>
</div>
<div class="scroll-container">
  <div class="muro-container">
    @for (politica of politicas; track politica.nombre){
      <div class="politica-wrapper">
        <app-card-politicas [politica]="politica"></app-card-politicas>
        <div class="acciones-politica">
          <button mat-icon-button color="primary" title="Editar" (click)="editarPolitica(politica.nombre)">
            <mat-icon>edit</mat-icon>
          </button>
          
          <app-x-btn color="dark" (click)="eliminarPolitica(politica.nombre)"></app-x-btn>
        </div>
      </div>
    } @empty { @if (loading) {
    <app-spinner [centrado]="true" size="md" mode="dark"></app-spinner>
    } @else {
    <span class="empty">No hay politicas vigentes en este momento.</span>
    } }

  </div>
  <app-button3 text="Crear Politica" (click)="crearPolitica()"></app-button3>

</div>
