<div class="title">
  <app-go-back label="Volver al Menú" url="admin/comunicacion" mode="light"></app-go-back>
  <h1 class="page-title">Mensaje Privado</h1>
</div>

<form class="form" [formGroup]="form">


  <app-select
  label="Usuario"
  [icon]="faEnvelope"
  name="mail"
  [value]="form.get('mail')?.value"
  [options]="mailOptions"
  (valueChange)="form.get('mail')?.setValue($event)"
  ></app-select>

  <app-input-string
    label="Asunto"
    [icon]="faHeading"
    type="text"
    name="subject"
    placeholder="Ingrese el asunto del mensaje"
    prefixMessage="El asunto"
    [required]="true"
    [form]="form"
    formControlName="subject"
  ></app-input-string>

  <app-input-text-area
      label="Mensaje"
      [icon]="faMessage"
      name="text"
      placeholder="Ingrese el contenido del mensaje"
      prefixMessage="El mensaje"
      [required]="true"
      [form]="form"
      formControlName="text"
      [rows]="7"
    ></app-input-text-area>

  <div class="buttons">
    <app-button2 text="Cancelar" (click)="cancelar()"></app-button2>
    <app-button1 text="Enviar mensaje" (click)="enviarMensaje()"></app-button1>
  </div>

  @if (loading) {
  <app-spinner mode="light" [centrado]="true" size="md"></app-spinner>
  }
</form>
