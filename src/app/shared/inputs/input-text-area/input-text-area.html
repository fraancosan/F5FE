@if (icon) {
<span class="label">
  <fa-icon class="icon" [icon]="icon" size="lg" [fixedWidth]="true"></fa-icon>
  {{ label }}
</span>
} @else {
<span class="label">{{ label }}</span>
}

<textarea
  class="input"
  [name]="name"
  [placeholder]="placeholder"
  [required]="required"
  [disabled]="disabled"
  [rows]="rows"
  [value]="value"
  (input)="handleInput($event)"
></textarea>

@if (form && form.controls[name].invalid && (form.controls[name].dirty || form.controls[name].touched)) {
<span class="error">{{ vs.getMessageError(form, name, prefixMessage) }}</span>
}
